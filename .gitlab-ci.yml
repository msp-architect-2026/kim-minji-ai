stages:
  - build

variables:
  IMAGE_NAME: gitlab.local:5050/root/kim-minji-ai
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_HOST: tcp://localhost:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

build_and_push:
  stage: build
  image: docker:26
  services:
    - name: docker:26-dind
      command: ["--insecure-registry=gitlab.local:5050"]
  tags:
    - arm64
    - docker
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD gitlab.local:5050
  script:
    - docker build --platform linux/arm64 -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest
  only:
    - develop
    - main